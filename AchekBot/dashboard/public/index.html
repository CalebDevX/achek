<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AchekBot Admin Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-success mb-4">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">AchekBot Admin Dashboard</span>
    </div>
  </nav>
  <div class="container">
    <div class="row">
      <div class="col-md-4">
        <div class="card mb-4">
          <div class="card-header">Leads</div>
          <div class="card-body" id="leads">
            <p>Loading leads...</p>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card mb-4">
          <div class="card-header">Sessions</div>
          <div class="card-body" id="sessions">
            <p>Loading sessions...</p>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card mb-4">
          <div class="card-header">Analytics</div>
          <div class="card-body" id="analytics">
            <p>Loading analytics...</p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    fetch('/api/leads').then(r=>r.json()).then(data=>{
      document.getElementById('leads').innerHTML = data.leads.length ? data.leads.map(l=>`<div>${l.name} (${l.email})</div>`).join('') : '<p>No leads yet.</p>';
    });
    fetch('/api/sessions').then(r=>r.json()).then(data=>{
      document.getElementById('sessions').innerHTML = data.sessions.length ? data.sessions.map(s=>`<div>${s.status}</div>`).join('') : '<p>No sessions yet.</p>';
    });
    fetch('/api/analytics').then(r=>r.json()).then(data=>{
      document.getElementById('analytics').innerHTML = Object.keys(data.stats).length ? JSON.stringify(data.stats) : '<p>No analytics yet.</p>';
    });
  </script>
</body>
</html>
